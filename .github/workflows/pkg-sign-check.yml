# Temporary diagnostic: signs a trivial one-file .pkg on the hosted macOS
# image to isolate a productbuild hang seen during the v0.22.0 release.
# Run 1 sampled productbuild blocked in securityd generateSignature — a
# key-authorization wait. This variant imports the keys with -A (any
# process may use them; the keychain is ephemeral and never leaves the
# runner) to prove that unblocks package signing. Remove once confirmed.
name: pkg-sign-check

on:
  workflow_dispatch:

jobs:
  check:
    name: Sign trivial pkg (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
    env:
      SIGNING_ENABLED: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Toolchain report
        run: |
          sw_vers
          xcode-select -p
          xcodebuild -version
          pkgutil --pkgs | head -2 || true

      - name: Import signing certificates
        if: env.SIGNING_ENABLED != ''
        env:
          APPLE_APP_CERT_P12_BASE64: ${{ secrets.APPLE_APP_CERT_P12_BASE64 }}
          APPLE_INSTALLER_CERT_P12_BASE64: ${{ secrets.APPLE_INSTALLER_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/openavc-signing.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$APPLE_APP_CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/app.p12"
          echo "$APPLE_INSTALLER_CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/app.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_P12_PASSWORD" -A
          security import "$RUNNER_TEMP/installer.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_P12_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" > /dev/null
          security default-keychain -d user -s "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$RUNNER_TEMP/app.p12" "$RUNNER_TEMP/installer.p12"

      - name: Build and sign a trivial package
        env:
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
        run: |
          mkdir -p /tmp/diagroot/OpenAVC-diag
          echo hello > /tmp/diagroot/OpenAVC-diag/readme.txt
          pkgbuild --root /tmp/diagroot --identifier com.openavc.pkgsigncheck \
            --version 1.0 /tmp/component.pkg
          echo "pkgbuild done, signing with productbuild..."
          # Sample the process tree if signing takes longer than 90s so the
          # log shows exactly where productbuild is stuck.
          ( sleep 90
            PB=$(pgrep -x productbuild | head -1)
            if [ -n "$PB" ]; then
              echo "=== productbuild still running after 90s, sampling ==="
              sample "$PB" 5 -file /tmp/pb-sample.txt || true
              head -80 /tmp/pb-sample.txt || true
            fi ) &
          WATCH=$!
          time productbuild --package /tmp/component.pkg \
            --sign "$APPLE_INSTALLER_SIGNING_IDENTITY" /tmp/signed.pkg
          kill "$WATCH" 2>/dev/null || true
          echo "signed OK"
          pkgutil --check-signature /tmp/signed.pkg
