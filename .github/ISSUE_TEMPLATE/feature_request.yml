name: Feature request
description: Suggest an idea or enhancement for OpenAVC
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Tell us what you are trying to do and we will take a look.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that OpenAVC does not support today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Device models, room types, mockups, links, or anything else that adds context.
    validations:
      required: false
